syntax = "proto3";

package state;

option go_package = "github.com/sologenic/com-fs-state-model;state";

import "google/protobuf/empty.proto";
import "state.proto";
import "sologenic/com-fs-utils-lib/models/metadata/metadata.proto";

service StateService {
    rpc Upsert(state.State) returns (google.protobuf.Empty);
    rpc Get(StateQuery) returns (state.State);
}

message StateQuery {
    metadata.Network Network = 1;
    state.StateType StateType = 2;
}